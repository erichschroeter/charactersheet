      The Current Quest: Seeking the Rod of Saint Fe'tuth
      
    font: "HeBo"
    font_size: 6

  Allies:
    value: |
      House Aetherwyn
      Sigil: A silver star suspended within a ring of seven arcane circles.
      Motto: "Power Shapes Destiny."
      House Aetherwyn is one of the most respected magical families in Windmire. Though not among the Seven Noble Houses, their influence reaches every corner of Windmire. They
      provide magical services, enchantments, wards, and arcane expertise to the city's great houses while pursuing a long-standing ambition: to one day secure a place among them. For
      generations House Aetherwyn has believed they are only one marriage, one alliance, or one extraordinary achievement away from joining the Council of Tides.
    font_size: 6
  Feat+Traits:
    value: |
      
    font: "Courier New"
    font_size: 6
  Treasure:
    value: |
      Pearl of Power (attunement)
        While this pearl is on your person, you can use an action to speak its command word and regain one expended spell slot. If the expended slot is of 4th level or higher, the new slot is 3rd level. Once you have used the pearl, it can't be used again until the next dawn.
      Ring of Evasion (attunement)
        This ring has 3 charges, and it regains 1d3 expended charges daily at dawn. When you fail a Dexterity saving throw while wearing it, you can use your reaction to expend 1 of its charges to succeed on that saving throw instead.
      
    font: "Courier New"
    font_size: 6

