# Multi-line Text boxes
text_boxes:
  PersonalityTraits:
    value: "I collect stories, not accomplishments, and I can usually find something exciting in the worst situations."
    font_size: 6.5
  Ideals:
    value: "People shouldn't be judged by how well they fit expectations."
    font_size: 6.5
  Bonds:
    value: "My brother, Ashur, believes I'm destined for great things and I never want to prove him wrong."
    font_size: 6.5
  Flaws:
    value: "By my words and actions, I often bring shame to my family. I hide my insecurities behind jokes and confidence."
    font_size: 6.5
  Features and Traits:
    value: |
      Font of Magic (p101)
      You have 5 sorcery points. You regain all spent sorcery points when you finish a long rest. You can use your sorcery points to gain additional spell slots, or sacrifice spell slots to gain additional sorcery points. 
      You can transform unexpended sorcery points into one spell slot as a bonus action on your turn. Any spell slot you create with this feature vanishes when you finish a long rest. The conversion is as follows:  
      • Spell Slot Level 1  | 2 Sorcery Points
      • Spell Slot Level 2  | 3 Sorcery Points
      • Spell Slot Level 3  | 5 Sorcery Points
      • Spell Slot Level 4  | 6 Sorcery Points
      • Spell Slot Level 5  | 7 Sorcery Points
      As a bonus action on your turn, you can expend one spell slot and gain a number of sorcery points equal to the slot's level.

      Metamagic (p101) 
      You can alter spells to suit your needs; you know 2 Metamagic options which can be used to temporarily modify spells you cast. 
        Distant Spell (p102) When you cast a spell with a range of at least 5 ft., you can spend 1 Sorcery Point to double its range. Or when you cast a spell that has a range of Touch, you can spend 1 Sorcery Point to make the spell’s range 30 ft. 
        Quickened Spell (p102) When you cast a spell with a casting time of an action, you can spend 2 Sorcery Points to change the casting time to a Bonus Action for this casting. You can’t modify a spell in this way if you’ve already cast a level 1+ spell on the current turn, nor can you cast a level 1+ spell on the current turn after modifying a spell in this way. 
      
      Wild Magic Surge (p103)
      Once per turn, you can roll 1d20 immediately after casting a Sorcerer spell with a spell slot. If you roll a 1, roll on the Wild Magic Surge table to create a magical effect. If the magical effect is a spell, it’s too wild to be affected by your Metamagic.

      Tides of Chaos (p103) 
      You can give yourself Advantage on one attack roll, ability check, or saving throw before you roll the d20. Once used, ToC remains expended until you to roll on the Wild Magic Surge table, which instantly recharges ToC or after a long rest, whichever comes first.

    font: "Courier New"
    font_size: 5.5
