# ------------------------------------------------------------------------------
# D&D 5E Fillable Character Sheet - YAML Template
# ------------------------------------------------------------------------------
# Configure global typography styling here.
# Standard built-in PDF fonts:
#   Helv (Helvetica Regular), HeBo (Helvetica Bold), HeIt (Helvetica Italic), HeBI (Helvetica Bold-Italic)
#   TiRo (Times Regular), TiBo (Times Bold), TiIt (Times Italic), TiBI (Times Bold-Italic)
#   Cour (Courier Regular), CoBo (Courier Bold), CoIt (Courier Italic), CoBI (Courier Bold-Italic)
# ------------------------------------------------------------------------------
styling:
  # Symbolic name to register for the embedded font
  font: "CascadiaMonoNF"
  # The physical OTF/TTF file path on your system
  font_file: "/home/erich/.local/share/fonts/CascadiaMonoNF-Regular.otf"
  font_size: 10
  # RGB values between 0.0 and 1.0 (e.g., [0.0, 0.0, 0.0] for Black)
  text_color: [0.0, 0.0, 0.0]
  # How checked boxes/bubbles are rendered:
  #   "checkmark" - standard PDF browser/viewer checkmark
  #   "circle" - perfect solid vector circle drawn over the field
  fill_checkbox_style: "circle"
  # Flatten PDF form fields into static vector page content (Draws embedded fonts permanently)
  #   Set to true for maximum compatibility on mobile/web-browser readers (recommended for Nerd Fonts)
  flatten_pdf: false

# ------------------------------------------------------------------------------
# Field Configurations
# ------------------------------------------------------------------------------
# You can define a field's value in two ways:
#
# 1. Simple value (uses global styling settings):
#    CharacterName: "Grog Strongjaw"
#
# 2. Rich object (overrides global styling for just this field):
#    CharacterName:
#      value: "Grog Strongjaw"
#      font: "HeBI"               # Helvetica Bold-Italic
#      font_size: 14              # Larger font for the character name
#      text_color: [0.6, 0.1, 0.1] # Dark red color
# ------------------------------------------------------------------------------
# ------------------------------------------------------------------------------
# Page 1
# ------------------------------------------------------------------------------
# ┌────────────────────────────────────┐   ┌────┬────────────────────────────────────────────────────┐
# │              ┌────────────────────┐│   │ ID │                        YAML                        │
