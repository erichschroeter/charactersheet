character_appearance:
  CharacterName 2: "Brokkur Stonehelm"
  # Dwarves considered young until they reach the age of 50. Average life: 350 years.
  Age: "84"
  Height: "4'2\""
  Weight: "150 lbs"
  Eyes: "Deep Green"
  Skin: "Ruddy, weathered"
  Hair: "Brown, braided beard"

# ------------------------------------------------------------------------------
# Page 2 Background, Allies, and Features
# ------------------------------------------------------------------------------
character_backstory_details:
  Backstory:
    value: |
      The Current Quest: Seeking the Forge of Heaven
      Brokkur has left Windford. He is traveling the world of Abryryim as an adventurer, testing his defensive gadgets in the harshest environments. But his ultimate goal lies back in his homeland.
      He wants to return to Windford, bypass Lord Grizfane's "unbreachable" vault defenses, and recover his father’s remains. To do that, he needs to build a device capable of withstand the crushing pressure of the flooded vaults. He needs Dark Diamond Ore, and he needs to learn the secrets of the Forge of Heaven to shape it into the ultimate protective suit.
      He travels with your group not just as a comrade, but as their guardian angel. He watches over them with a hyper-vigilant, protective eye, constantly tinkering, constantly upgrading, ensuring that this time, everyone comes home alive.
    font: "HeBo"
    font_size: 6

  Allies:
    value: |
      - The Guild of Armorers (Windford)
    # - Barony of Stonefell
    # - "Tinker" (Homunculus Servant / Mechanical Owl)
    font_size: 6
  # FactionName: "Barony of Stonefell"
  Feat+Traits:
    value: |
      Guild Membership: Guild merchants will support you if you pay your monthly dues of 5 gp.
      Armor Model (short rest, long rest)
      Dreadnaught:
        - Force Demolisher (Simple melee) 1d10 (Force) + INT mod
          On hit, push or pull target 10 ft (at least one size smaller).
        - (Bonus Action) Giant Stature ☐ ☐ ☐ ☐
          for 1 min, reach increases 5 ft and you become Large if you are smaller.
          number of times equal to INT modifier
          reset after long reset
      Guardian:
        - Thunder Gauntlets (Simple melee) 1d8 (Thunder) + INT mod
          On hit, the target has disadvantage on attacks against anyone except you.
        - Distracting Pulse:
          target disadvantage on attack rolls against targets other than you
          until start of your next turn
        - (Bonus Action) Defensive Field
          temporary HP equal to Artificer level
      Infiltrator:
        - Lightning Launcher (Simple ranged) 1d6 (Lightning) + INT mod
          1d6 lightning (extra 1d6 once per turn on hit), range 90/300.
        - Powered Steps: speed +5
        - Dampening Field: advantage DEX (stealth) checks
    font: "Courier New"
    font_size: 6
  Treasure:
    value: |
      Bag of Holding:
        Artisan's Tools (x5)
        (class) Studded Leather Armor
    font: "Courier New"
    font_size: 6


